<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𔒌 زينــب౨ৎ꒱ ꒱ | أوبي، چبس 🩵💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: #333; overflow-x: hidden;
        }

        /* الخلفية (نفس الكود الخاص بكِ) */
        .background-slideshow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .slide {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 1; }
        .slide1 { background-image: url('miffy.jpg'); }
        .slide2 { background-image: url('miku.jpg'); }
        .slide3 { background-image: url('pocoyo.jpg'); }

        .profile-container {
            width: 90%; max-width: 450px; text-align: center; z-index: 10;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .avatar-container {
            width: 110px; height: 110px; border-radius: 50%;
            margin: 0 auto 15px; border: 4px solid #fff;
            background-image: url('avatar.jpg');
            background-size: cover; background-position: center;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #4682B4; font-size: 2.5rem; margin: 0;
        }

        .nickname {
            color: #9370DB; font-size: 1.2em; font-weight: bold; margin-bottom: 25px;
        }

        /* تصميم الأزرار (أزرق سمائي شفاف وكتابة بنفسجية) */
        .menu-buttons {
            display: flex; flex-direction: column; gap: 12px;
        }

        .tab-btn {
            background: rgba(135, 206, 235, 0.4); /* أزرق سمائي شفاف */
            color: #9370DB; /* كتابة بنفسجية */
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .tab-btn:hover, .tab-btn.active {
            background: rgba(135, 206, 235, 0.7);
            transform: scale(1.02);
        }

        /* محتوى المعلومات (يظهر عند الضغط) */
        .tab-content {
            display: none; /* مخفي افتراضياً */
            background: rgba(255, 255, 255, 0.4);
            margin-top: 15px;
            padding: 20px;
            border-radius: 20px;
            text-align: right;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active { display: block; }

        .info-item {
            display: flex; justify-content: space-between;
            margin-bottom: 10px; border-bottom: 1px solid rgba(147, 112, 219, 0.1);
            padding-bottom: 5px; font-size: 0.95em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { margin-top: 25px; font-size: 0.8em; color: rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div class="background-slideshow">
        <div class="slide slide1 active"></div>
        <div class="slide slide2"></div>
        <div class="slide slide3"></div>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="avatar-container"></div>
            <h1>𔒌 زينــب౨ৎ</h1>
            <p class="nickname">(أوبي، چبس 💜)</p>

            <div class="menu-buttons">
                <button class="tab-btn" onclick="openTab(event, 'basic')">المعلومات الأساسية</button>
                <div id="basic" class="tab-content">
                    <div class="info-item"><span>📅 المواليد:</span> <span>2011/8/3</span></div>
                    <div class="info-item"><span>🎂 العمر:</span> <span id="age">--</span> سنة</div>
                    <div class="info-item"><span>🦊 الحيوان المفضل:</span> <span>الثعلب</span></div>
                    <div class="info-item"><span>🎨 اللون المفضل:</span> <span style="color:#9370DB">الأرجواني</span></div>
                </div>

                <button class="tab-btn" onclick="openTab(event, 'bio')">السيرة الذاتية والأهداف</button>
                <div id="bio" class="tab-content">
                    <div class="info-item"><span>🎓 المرحلة:</span> <span>ثالث متوسط</span></div>
                    <div class="info-item"><span>🌐 اللغات:</span> <span>عربي، انكليزي، فرنسي (تعلم)</span></div>
                    <div class="info-item"><span>🏗️ الأهداف:</span> <span>مهندسة</span></div>
                </div>

                <button class="tab-btn" onclick="openTab(event, 'hobbies')">الهوايات والألعاب</button>
                <div id="hobbies" class="tab-content">
                    <div class="info-item"><span>🕹️ الهوايات:</span> <span>ايديت، رسم (معتزلة)</span></div>
                    <div class="info-item"><span>🪐 الألعاب:</span> <span>Genshin Impact</span></div>
                </div>
            </div>

            <div class="footer">صنع بكل حب 💜 في عالم جبسايتي</div>
        </div>
    </div>

    <script>
        // دالة تبديل الأزرار
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                if (tabcontent[i].id !== tabName) {
                    tabcontent[i].classList.remove("active");
                }
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            
            const targetTab = document.getElementById(tabName);
            targetTab.classList.toggle("active");
            if (targetTab.classList.contains("active")) {
                evt.currentTarget.classList.add("active");
            }
        }

        // حساب العمر
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
            return age;
        }
        document.getElementById('age').innerText = calculateAge('2011-08-03');

        // السلايدشو (نفس كودك)
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
