<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𔒌 زينــب౨ৎ꒱ ꒱ | أوبي، چبس 🩵💜</title>
    <style>
        /* إعدادات الخطوط */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* لضمان ظهور المحتوى من الأعلى في الموبايل */
            color: #333;
            overflow-x: hidden;
        }

        /* --- الخلفية المتغيرة --- */
        .background-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active { opacity: 1; }
        .slide1 { background-image: url('miffy.jpg'); background-color: #f8f9fa; }
        .slide2 { background-image: url('miku.jpg'); background-color: #e0f7fa; }
        .slide3 { background-image: url('pocoyo.jpg'); background-color: #ede7f6; }

        /* --- حاوية البطاقة (Glassmorphism المحسن) --- */
        .profile-container {
            width: 92%;
            max-width: 550px;
            margin: 20px auto;
            position: relative;
            z-index: 10;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 30px 15px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        /* الإحصائيات العلوية */
        .header-stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            font-size: 0.78em;
            margin-bottom: 25px;
            color: #4682B4;
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
            padding-bottom: 10px;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-image: url('avatar.jpg');
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #4682B4;
            font-size: 2.2rem;
            margin: 5px 0;
            direction: ltr;
        }

        .nickname {
            color: #9370DB;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* --- تصميم الأقسام المدمج (يشبه صورة الآيباد) --- */
        .sections-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px 20px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: right;
            transition: transform 0.3s ease;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #4682B4;
            margin-bottom: 12px;
            border-right: 4px solid #9370DB;
            padding-right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* جعل القائمة توزع المحتوى يميناً ويساراً */
        .info-list {
            list-style: none;
            padding: 0; margin: 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between; /* التوزيع يمين ويسار */
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .item-label { color: #666; font-weight: bold; }
        .item-value { color: #222; text-align: left; }

        .age-highlight {
            color: #9370DB;
            font-weight: bold;
            background: rgba(147, 112, 219, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: rgba(0,0,0,0.4);
        }

        .heart-icon {
            color: #9370DB;
            animation: heartBeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* تعديلات للشاشات الكبيرة (Desktop) */
        @media (min-width: 600px) {
            .header-stats { justify-content: space-between; font-size: 0.85em; }
            h1 { font-size: 2.8rem; }
            .avatar-container { width: 130px; height: 130px; }
            .profile-card { padding: 40px; }
        }
    </style>
</head>
