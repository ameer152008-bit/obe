<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𔒌 زينــب౨ৎ | أوبي، چبس 🩵💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: #333; overflow: hidden;
        }

        /* --- نظام الخلفية (تم الضبط لملء الشاشة تماماً) --- */
        .background-slideshow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .slide {
            position: absolute; width: 100%; height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%; /* تملأ الطول والعرض تماماً */
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 1; }
        .slide1 { background-image: url('miffy.jpg'); }
        .slide2 { background-image: url('miku.jpg'); }
        .slide3 { background-image: url('pocoyo.jpg'); }

        /* --- البطاقة الشفافة --- */
        .profile-container {
            width: 90%; max-width: 420px; z-index: 10;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .avatar-container {
            width: 100px; height: 100px; border-radius: 50%;
            margin: 0 auto 15px; border: 3px solid #fff;
            background-image: url('avatar.jpg');
            background-size: cover; background-position: center;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #4682B4; font-size: 2.3rem; margin: 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .nickname {
            color: #9370DB; font-size: 1.1em; font-weight: bold; margin-bottom: 20px;
        }

        /* --- الأزرار (أزرق سمائي شفاف وخط بنفسجي) --- */
        .menu-buttons {
            display: flex; flex-direction: column; gap: 10px;
        }

        .tab-btn {
            background: rgba(135, 206, 235, 0.4); 
            color: #9370DB; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 14px;
            border-radius: 15px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .tab-btn.active {
            background: rgba(135, 206, 235, 0.7);
            border: 1px solid #9370DB;
        }

        /* --- محتوى المعلومات --- */
        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            padding: 15px;
            border-radius: 15px;
            text-align: right;
            animation: slideDown 0.4s ease;
        }

        .tab-content.active { display: block; }

        .info-item {
            display: flex; justify-content: space-between;
            margin-bottom: 8px; border-bottom: 1px solid rgba(147, 112, 219, 0.1);
            padding-bottom: 4px; font-size: 0.9em;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { margin-top: 20px; font-size: 0.75em; color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="background-slideshow">
        <div class="slide slide1 active"></div>
        <div class="slide slide2"></div>
        <div class="slide slide3"></div>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="avatar-container"></div>
            <h1>𔒌 زينــب౨ৎ</h1>
            <p class="nickname">(أوبي، چبس 💜)</p>

            <div class="menu-buttons">
                <button class="tab-btn" onclick="openTab(event, 'basic')">المعلومات الأساسية</button>
                <div id="basic" class="tab-content">
                    <div class="info-item"><span>📅 المواليد:</span> <span>2011/8/3</span></div>
                    <div class="info-item"><span>🎂 العمر:</span> <span id="age">--</span> سنة</div>
                    <div class="info-item"><span>🦊 الحيوان المفضل:</span> <span>الثعلب</span></div>
                    <div class="info-item"><span>🎨 اللون المفضل:</span> <span style="color:#9370DB"> الازرق و الأرجواني</span></div>
                </div>

                <button class="tab-btn" onclick="openTab(event, 'bio')">السيرة الذاتية والأهداف</button>
                <div id="bio" class="tab-content">
                    <div class="info-item"><span>🎓 المرحلة:</span> <span>ثالث متوسط</span></div>
                    <div class="info-item"><span>🌐 اللغات:</span> <span>عربي، انكليزي، فرنسي (جارِ التعلم)</span></div>
                    <div class="info-item"><span>🏗️ الأهداف:</span> <span>مهندسة</span></div>
                </div>

                <button class="tab-btn" onclick="openTab(event, 'hobbies')">الهوايات والألعاب</button>
                <div id="hobbies" class="tab-content">
                    <div class="info-item"><span>🕹️ الهوايات:</span> <span>ايديت، رسم (معتزلة)</span></div>
                    <div class="info-item"><span>🪐 الألعاب:</span> <span>Genshin Impact</span></div>
                </div>
            </div>

            <div class="footer">صنع بكل حب 💜 في عالم جبسايتي</div>
        </div>
    </div>

    <script>
        // تبديل الأقسام
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            const buttons = document.getElementsByClassName("tab-btn");
            const targetContent = document.getElementById(tabName);
            const isAlreadyActive = targetContent.classList.contains("active");

            // إغلاق الكل أولاً
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
                buttons[i].classList.remove("active");
            }

            // إذا لم يكن مفتوحاً، افتحه
            if (!isAlreadyActive) {
                targetContent.classList.add("active");
                evt.currentTarget.classList.add("active");
            }
        }

        // حساب العمر تلقائياً
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
            return age;
        }
        document.getElementById('age').innerText = calculateAge('2011-08-03');

        // السلايدشو
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
